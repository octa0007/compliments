<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sana Özel 💕</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0d0508;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Lato', sans-serif;
      color: #f9e8ef;
      overflow-x: hidden;
      padding: 2rem 1rem;
      position: relative;
    }

    /* Stars */
    #stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.08; }
      50% { opacity: 0.6; }
    }

    /* Rose petals */
    .petal {
      position: fixed;
      border-radius: 50% 0 50% 0;
      pointer-events: none;
      z-index: 1;
      animation: fallDown linear infinite;
      opacity: 0;
    }
    @keyframes fallDown {
      0%   { transform: translateY(-30px) rotate(0deg) scale(1);   opacity: 0.7; }
      80%  { opacity: 0.5; }
      100% { transform: translateY(110vh) rotate(520deg) scale(0.7); opacity: 0; }
    }

    /* Layout */
    .container {
      position: relative;
      z-index: 10;
      max-width: 620px;
      width: 100%;
      text-align: center;
    }

    /* Top name */
    .for-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.1rem, 3.5vw, 1.5rem);
      color: #f0d060;
      letter-spacing: 0.06em;
      margin-bottom: 0.3rem;
      animation: fadeDown 0.9s ease both;
    }
    .today-label {
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #c9a0b4;
      margin-bottom: 2rem;
      animation: fadeDown 0.9s ease 0.15s both;
    }

    /* Card */
    .card {
      border: 1px solid rgba(212,175,55,0.18);
      border-radius: 22px;
      padding: clamp(2rem,6vw,3.5rem) clamp(1.5rem,5vw,3rem);
      margin-bottom: 1.8rem;
      background: rgba(18,6,13,0.9);
      animation: fadeIn 1.1s ease 0.3s both;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% -20%, rgba(194,24,91,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .comp-tag {
      font-size: 0.68rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #f48fb1;
      margin-bottom: 1.8rem;
    }

    .compliment {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.25rem, 4vw, 1.85rem);
      line-height: 1.65;
      color: #fdeef5;
      font-style: italic;
      margin-bottom: 2rem;
      position: relative;
    }
    .compliment::before { content: '\201C'; color: #d4af37; font-size: 3em; line-height: 0; vertical-align: -0.45em; margin-right: 0.05em; font-style: normal; }
    .compliment::after  { content: '\201D'; color: #d4af37; font-size: 3em; line-height: 0; vertical-align: -0.45em; margin-left: 0.05em;  font-style: normal; }

    .from-line {
      font-size: 0.82rem;
      color: #c9a0b4;
      letter-spacing: 0.12em;
    }

    /* Stats */
    .stats {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 1.8rem;
      flex-wrap: wrap;
      animation: fadeUp 0.9s ease 0.7s both;
    }
    .stat {
      border: 1px solid rgba(212,175,55,0.13);
      border-radius: 14px;
      padding: 0.85rem 1.4rem;
      min-width: 110px;
      background: rgba(212,175,55,0.04);
    }
    .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 500;
      color: #d4af37;
      line-height: 1;
      margin-bottom: 0.3rem;
    }
    .stat-lbl {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #c9a0b4;
    }

    /* Footer */
    footer {
      font-size: 0.82rem;
      color: #c9a0b4;
      animation: fadeUp 0.9s ease 0.9s both;
    }
    .heart { display: inline-block; animation: pulse 2.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.18)} }

    /* Day of year progress */
    .progress-wrap {
      max-width: 280px;
      margin: 1.5rem auto 0;
    }
    .progress-lbl {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #c9a0b4;
      margin-bottom: 5px;
      text-align: left;
    }
    .progress-bar { background: rgba(255,255,255,0.06); border-radius: 99px; height: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg,#c2185b,#d4af37); border-radius: 99px; }

    /* Animations */
    @keyframes fadeDown { from{opacity:0;transform:translateY(-18px)} to{opacity:1;transform:none} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(18px)}  to{opacity:1;transform:none} }
    @keyframes fadeIn   { from{opacity:0} to{opacity:1} }

    /* Responsive */
    @media(max-width:480px) {
      .stat { min-width: 90px; }
    }
  </style>
</head>
<body>

<div id="stars"></div>

<!-- ── CONFIGURATION ─────────────────────────────────────────── -->
<script>
  const CONFIG = {
    name:          "Aşkım",          // ← her name or nickname (e.g. "Elif", "Canım")
    togetherSince: "",               // ← your anniversary, e.g. "2021-06-15" (leave "" to hide)
    senderName:    "Seni seven",     // ← how you sign off
    city:          "Kırşehir",       // ← her hometown shown in footer
  };
</script>
<!-- ──────────────────────────────────────────────────────────── -->

<script>
  const COMPLIMENTS = [
    "Gülüşün odayı aydınlatıyor, tıpkı güneşin sabahı aydınlattığı gibi.",
    "Sen dünyayı daha güzel bir yer yapıyorsun, sadece var olarak.",
    "Varlığın tek başına bir armağan — bunu hiç unutma.",
    "Gözlerin içindeki güzelliği yansıtıyor; görmek isteyenlere yeter.",
    "Seninle geçen her an, hayatımın en değerli anları arasında.",
    "Zekân ve güzelliğin mükemmel bir uyum içinde dans ediyor.",
    "Kalbinin iyiliği seni dünyada eşsiz kılıyor.",
    "Seninle olmak cenneti yeryüzünde yaşatıyor.",
    "Sesinin tonu beni her seferinde büyülüyor.",
    "Sen her bakışta biraz daha güzelleşiyorsun.",
    "Düşünce biçimin beni her zaman hayrete düşürüyor.",
    "Seninle gülmek dünyanın en güzel sesi.",
    "Sen olmasan bu dünya ne kadar eksik kalırdı.",
    "Güçlü ve nazik olmayı bir arada başarmak için seçilmiş gibisin.",
    "Her geçen gün seni bir önceki günden daha çok seviyorum.",
    "Sen benim en büyük ilham kaynağımsın.",
    "Bakışlarında bir dünya var; içinde kaybolmak istiyorum.",
    "Seninle geçirdiğim her dakika, bir hazine gibi saklıyorum içimde.",
    "Seni düşündüğümde her şey daha hafif hissettiriyor.",
    "Hem güçlü hem şefkatli olmayı — bunu çok az kişi başarır.",
    "Kahkahanı duymak benim için en değerli armağan.",
    "Sen benim kalbimin en huzurlu köşesisin.",
    "Varlığın sadece benim için değil, çevrendeki herkes için bir şans.",
    "Seninle baş başa geçirilen her an, ömrümün en değerlisi.",
    "Seni sevmek hayatımın en doğru kararı.",
    "Sen benim için güneşin doğduğu yönsün.",
    "Her halin farklı bir güzellik taşıyor.",
    "Seninle her şey daha anlamlı hissettiriyor.",
    "Hem aklımı hem kalbimi dolduruyorsun — bu bende herkese nasip olmaz.",
    "Kibarlığın ve nezaketin seni çok özel yapıyor.",
    "Seninle olmak, hayatımın en büyük şansı.",
    "Sen benim en sevdiğim hikayesin.",
    "Seninle geçen her mevsim renkleniyor, anlam kazanıyor.",
    "Senin varlığın hayatıma anlam katıyor.",
    "Her gün seninle biraz daha büyüyorum.",
    "Sen benim için çok değerlisin — bunu her zaman bil.",
    "Seninle olmak bir rüya, ama gerçeğinden daha güzel.",
    "Güzelliğin içten geliyor; bu seni gerçekten eşsiz kılıyor.",
    "Sen benim dünyamın en güzel köşesisin.",
    "Kalbin kadar güzel bir ruh az görülür.",
    "Seninle olmak bana tam bir huzur veriyor.",
    "Her bakışın kalbimi ısıtıyor, her seferinde.",
    "Hem akıllı hem zarif; iki şeyi aynı anda bu kadar güzel taşıyan az.",
    "Gözlerin içindeki sonsuz derinliği yansıtıyor.",
    "Seni sevmek, nefes almak kadar doğal geliyor bana.",
    "Sen benim için her gün yeniden doğan bir mucizesin.",
    "Zarif duruşun ve güzel kalbinle gerçekten eşsizsin.",
    "Her geçen gün sana olan sevgim biraz daha derinleşiyor.",
    "Sen hem güçlü hem naifsin — bu kombinasyon seni eşsiz yapıyor.",
    "Sen benim için güneşin ilk ışığı gibisin.",
    "Seninle her sabaha uyanmak, hayatımın en büyük lüksü.",
    "Seni tanımak, hayatıma en güzel şeyi katmak oldu.",
    "Sen her zaman çevreni daha aydınlık bir yere dönüştürüyorsun.",
    "Güzelliğin zamanla değil, kalpten geliyor — bu hiç solmaz.",
    "Seninle birlikte olmak, her gün küçük bir mucize.",
    "Senin gibisi gerçekten az; bu dünyada bunu bilen şanslı.",
    "Her gülüşünde bir dünya var ve ben o dünyada yaşamak istiyorum.",
    "Sen benim için yıldızlardan daha parlaksın.",
    "Seninle geçirilen her anı ömrüm boyunca hatırlayacağım.",
    "Sen benim kalbimin en sevdiği şarkısısın.",
    "Seni düşündüğümde her şey yerine oturuyor.",
    "Sana olan sevgim her gün biraz daha büyüyor.",
    "Seninle olmak, hayatımın en iyi kararı — her gün bunu hissediyorum.",
    "Sen benim için hem sığınak hem macera.",
    "Kırşehir seni doğurmuş, dünya sana şükretmeli.",
    "Seninle geçen 40 yıl dünyaya ne kadar güzellik kattı — düşünebiliyor musun?",
  ];

  // ── Turkish month names
  const TR_MONTHS = [
    "Ocak","Şubat","Mart","Nisan","Mayıs","Haziran",
    "Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"
  ];
  const TR_DAYS = ["Pazar","Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi"];

  // ── Pick compliment based on calendar date (stable all day, changes at midnight)
  function dayKey(d) {
    return d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();
  }
  function seededIndex(key, len) {
    // Simple hash so order isn't just sequential
    let h = key * 2654435761 >>> 0;
    h ^= h >> 16; h *= 0x45d9f3b; h ^= h >> 16;
    return Math.abs(h) % len;
  }

  function dayOfYear(d) {
    const start = new Date(d.getFullYear(), 0, 0);
    return Math.floor((d - start) / 86400000);
  }

  function daysBetween(a, b) {
    return Math.floor((b - a) / 86400000);
  }

  window.onload = () => {
    const now = new Date();

    // Compliment
    const idx = seededIndex(dayKey(now), COMPLIMENTS.length);
    document.getElementById('compliment-text').textContent = COMPLIMENTS[idx];

    // Header
    document.getElementById('for-name').textContent = `Sevgili ${CONFIG.name}`;

    // Date string
    document.getElementById('date-str').textContent =
      `${TR_DAYS[now.getDay()]}, ${now.getDate()} ${TR_MONTHS[now.getMonth()]} ${now.getFullYear()}`;

    // From
    document.getElementById('from-line').textContent = `— ${CONFIG.senderName}`;

    // Stats
    const doy = dayOfYear(now);
    const daysInYear = (now.getFullYear() % 4 === 0) ? 366 : 365;
    document.getElementById('day-num').textContent = doy;
    document.getElementById('progress-fill').style.width = (doy / daysInYear * 100).toFixed(1) + '%';
    document.getElementById('progress-lbl').textContent = `${doy}. gün — ${daysInYear - doy} gün kaldı`;

    if (CONFIG.togetherSince) {
      const since = new Date(CONFIG.togetherSince);
      const days = daysBetween(since, now);
      document.getElementById('together-stat').style.display = '';
      document.getElementById('together-days').textContent = days.toLocaleString('tr-TR');
    }

    // Footer
    document.getElementById('footer-city').textContent = CONFIG.city;
    document.getElementById('comp-count').textContent = idx + 1;
    document.getElementById('comp-total').textContent = COMPLIMENTS.length;

    // Stars
    const stars = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const sz = Math.random() < 0.3 ? 2 : 1;
      s.style.cssText = `
        width:${sz}px;height:${sz}px;
        top:${Math.random()*100}%;left:${Math.random()*100}%;
        animation-duration:${2.5+Math.random()*4}s;
        animation-delay:-${Math.random()*6}s;
      `;
      stars.appendChild(s);
    }

    // Petals
    const colors = ['#c2185b','#e91e8c','#f48fb1','#ad1457','#880e4f'];
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'petal';
      const sz = 8 + Math.random() * 10;
      p.style.cssText = `
        width:${sz}px;height:${sz}px;
        left:${Math.random()*100}%;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        animation-duration:${7+Math.random()*10}s;
        animation-delay:-${Math.random()*15}s;
      `;
      document.body.appendChild(p);
    }
  };
</script>

<div class="container">

  <p class="for-name" id="for-name">Sevgili Aşkım</p>
  <p class="today-label" id="date-str">…</p>

  <div class="card">
    <p class="comp-tag">✦ &nbsp; bugünkü sürprizin &nbsp; ✦</p>
    <p class="compliment" id="compliment-text">…</p>
    <p class="from-line" id="from-line">— Seni seven</p>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="day-num">—</div>
      <div class="stat-lbl">yılın günü</div>
    </div>
    <div class="stat" id="together-stat" style="display:none">
      <div class="stat-num" id="together-days">—</div>
      <div class="stat-lbl">birlikte gün</div>
    </div>
  </div>

  <div class="progress-wrap">
    <p class="progress-lbl" id="progress-lbl"></p>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <footer style="margin-top:2rem">
    <p><span class="heart">❤️</span></p>
    <p style="margin-top:0.6rem">
      Komplimanım <span id="comp-count">—</span> / <span id="comp-total">—</span>
      &nbsp;·&nbsp; Her gün farklı
      &nbsp;·&nbsp; <span id="footer-city">Kırşehir</span>'den dünyaya
    </p>
  </footer>

</div>

</body>
</html>

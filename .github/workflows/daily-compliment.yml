name: Daily Compliment Email

on:
  schedule:
    # Runs every day at 07:12 Vienna time (05:12 UTC)
    # Using an off-peak minute avoids GitHub Actions queue delays!
    - cron: '12 5 * * *'
  workflow_dispatch:  # also allow manual trigger for testing

jobs:
  send-compliment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Send daily compliment
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SITE_URL: ${{ secrets.SITE_URL }}   # e.g. https://yourname.github.io/love
        run: python send_compliment.py
